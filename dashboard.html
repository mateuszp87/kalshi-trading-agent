<!doctype html><html><head><meta charset="utf-8">
<title>Kalshi Agent</title>
<style>
:root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--dim:#8b949e;--fg:#e6edf3;
      --pos:#3fb950;--neg:#f85149;--acc:#58a6ff}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);
     font:14px/1.5 -apple-system,BlinkMacSystemFont,"SF Mono",monospace}
.wrap{max-width:1200px;margin:0 auto;padding:24px}
h1{font-size:20px;margin:0 0 2px}
.sub{color:var(--dim);font-size:12px;margin-bottom:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px}
.card .lbl{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.card .val{font-size:22px;font-weight:600;margin-top:4px}
.card .note{color:var(--dim);font-size:11px;margin-top:2px}
h2{font-size:14px;margin:24px 0 8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
table{width:100%;border-collapse:collapse;background:var(--panel);
      border:1px solid var(--line);border-radius:8px;overflow:hidden}
th{text-align:left;padding:8px 10px;font-size:11px;color:var(--dim);
   text-transform:uppercase;border-bottom:1px solid var(--line);font-weight:500}
td{padding:9px 10px;border-bottom:1px solid #21262d;font-size:13px}
tr:last-child td{border-bottom:none}
.pos{color:var(--pos)} .neg{color:var(--neg)}
.tick{font-size:10px;color:#6e7681}
.empty{padding:24px;text-align:center;color:var(--dim);background:var(--panel);
       border:1px solid var(--line);border-radius:8px}
</style></head><body><div class="wrap">
<h1>Kalshi Agent</h1>
<div class="sub" id="sub">loading…</div>
<div class="cards" id="cards"></div>
<h2>Open positions</h2><div id="open"></div>
<h2>Closed positions</h2><div id="closed"></div>
<h2>Calibration — does confidence mean anything?</h2><div id="calib"></div>
</div>
<script>
const $=(s)=>document.querySelector(s);
const money=(v)=>(v<0?"-$":"$")+Math.abs(v).toFixed(2);
const cls=(v)=>v>0?"pos":(v<0?"neg":"");
const when=(t)=>t?t.slice(5,16).replace("T"," "):"—";

function card(lbl,val,note,klass){
  return `<div class="card"><div class="lbl">${lbl}</div>
    <div class="val ${klass||''}">${val}</div>
    ${note?`<div class="note">${note}</div>`:""}</div>`;
}

async function load(){
  const d = await (await fetch("/api/data")).json();
  $("#sub").textContent =
    `since ${d.cutoff} · ${d.n_fills} fills · updated ${d.updated.slice(11,19)} UTC`;

  const wr = d.win_rate===null ? "—" : d.win_rate.toFixed(0)+"%";
  $("#cards").innerHTML =
      card("Cash", money(d.cash), "settled, spendable")
    + card("At risk", money(d.at_risk), `${d.n_open} open positions`)
    + card("Mark to market", money(d.mark), "open positions at bid")
    + card("Equity", money(d.equity), "cash + mark")
    + card("Realized P&L", money(d.realized_pnl), `${d.n_closed} settled`, cls(d.realized_pnl))
    + card("Unrealized P&L", money(d.unrealized_pnl), "not yours yet", cls(d.unrealized_pnl))
    + card("Win rate", wr, `${d.wins}W / ${d.losses}L`);

  if(!d.open.length){ $("#open").innerHTML='<div class="empty">none</div>'; }
  else{
    let h=`<table><thead><tr><th>Market</th><th>Side</th><th>Qty</th>
      <th>Entered</th><th>Avg</th><th>Now</th><th>Cost</th><th>Value</th>
      <th>Unrealized</th></tr></thead><tbody>`;
    for(const r of d.open){
      h+=`<tr><td><b>${r.title.slice(0,52)}</b>
        <div class="tick">${r.series}${r.event?" · "+r.event:""}${r.outcome?" · bet "+r.outcome:""}</div></td>
        <td class="${r.side==='YES'?'pos':'neg'}">${r.side}</td>
        <td>${r.qty}</td><td>${when(r.entry_time)}</td>
        <td>$${r.avg_price.toFixed(2)}</td><td>$${r.now.toFixed(2)}</td>
        <td>${money(r.cost)}</td><td>${money(r.value)}</td>
        <td class="${cls(r.unrealized)}">${money(r.unrealized)}
          <span style="opacity:.6">(${r.unrealized_pct>=0?'+':''}${r.unrealized_pct}%)</span></td></tr>`;
    }
    $("#open").innerHTML=h+"</tbody></table>";
  }

  if(!d.closed.length){
    $("#closed").innerHTML='<div class="empty">nothing has settled since '+d.cutoff+'</div>';
  } else {
    let h=`<table><thead><tr><th>Market</th><th>Side</th><th>Qty</th>
      <th>Entered</th><th>Settled</th><th>Cost</th><th>Result</th>
      <th>P&L</th></tr></thead><tbody>`;
    for(const r of d.closed){
      h+=`<tr><td><b>${(r.title||r.ticker).slice(0,52)}</b>
        <div class="tick">${r.series}${r.event?" · "+r.event:""}${r.outcome?" · bet "+r.outcome:""}</div></td>
        <td class="${r.side==='YES'?'pos':'neg'}">${r.side}</td>
        <td>${r.qty}</td><td>${when(r.entry_time)}</td><td>${when(r.settled_time)}</td>
        <td>${money(r.cost)}</td>
        <td>${r.won?'<span class="pos">WON</span>':'<span class="neg">LOST</span>'}</td>
        <td class="${cls(r.pnl)}">${money(r.pnl)}</td></tr>`;
    }
    $("#closed").innerHTML=h+"</tbody></table>";
  }
}
function calibTable(rows, label){
  if(!rows.length) return "";
  let h=`<table style="margin-bottom:12px"><thead><tr><th>${label}</th><th>Trades</th>
    <th>Claude claimed</th><th>Actually won</th><th>Gap</th><th>Net P&L</th></tr></thead><tbody>`;
  for(const r of rows){
    const gap = (r.actual - r.claimed).toFixed(1);
    h+=`<tr><td>${r.key}</td><td>${r.n}</td>
      <td>${r.claimed}%</td><td>${r.actual}%</td>
      <td class="${gap>=0?'pos':'neg'}">${gap>=0?'+':''}${gap}pp</td>
      <td class="${cls(r.pnl)}">${money(r.pnl)}</td></tr>`;
  }
  return h+"</tbody></table>";
}

function renderCalib(d){
  if(!d.n_graded){
    $("#calib").innerHTML =
      `<div class="empty">no graded trades yet — the agent started recording
       its confidence tonight, so this fills in as positions settle</div>`;
    return;
  }
  const c = d.calibration;
  let h = calibTable(c.by_confidence, "Confidence bucket")
        + calibTable(c.by_category, "Category");
  if(d.n_graded < 20){
    h += `<div class="empty" style="margin-top:4px">${d.n_graded} graded trades —
      too few to conclude anything. Wait for ~50.</div>`;
  }
  $("#calib").innerHTML = h;
}

const _load = load;
load = async function(){ await _load(); const d = await (await fetch("/api/data")).json(); renderCalib(d); };
load(); setInterval(load, 30000);
</script></body></html>
