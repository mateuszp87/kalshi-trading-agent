<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Kalshi Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#0a0e27;color:#e2e8f0;padding:1.5rem}.hdr{margin-bottom:1.5rem}.hdr h1{font-size:1.75rem;color:#60a5fa}.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}.metric{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:1rem}.metric-label{font-size:0.7rem;text-transform:uppercase;color:#94a3b8;margin-bottom:0.5rem}.metric-value{font-size:1.75rem;font-weight:bold}.metric-sub{font-size:0.8rem;color:#64748b;margin-top:0.25rem}.pos{color:#10b981}.neg{color:#ef4444}.panel{background:#1e293b;border:1px solid #334155;border-radius:8px;overflow:hidden;margin-bottom:1rem}.panel-hdr{padding:0.75rem 1rem;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center}.panel-hdr h2{font-size:0.9rem}.pill{background:#3b82f6;color:#fff;padding:0.2rem 0.6rem;border-radius:12px;font-size:0.7rem;font-weight:bold}table{width:100%;border-collapse:collapse}th,td{padding:0.75rem;text-align:left}th{font-size:0.7rem;text-transform:uppercase;color:#94a3b8;font-weight:600}tr:not(:last-child) td{border-bottom:1px solid #334155}tr:hover{background:#1e293b80}.ticker{font-family:monospace;color:#60a5fa;font-size:0.85rem}.loading{padding:1.5rem;text-align:center;color:#64748b}.mono{font-family:monospace}.right{text-align:right}
</style></head><body>
<div class="hdr"><h1>Kalshi Trading Dashboard</h1></div>
<div class="metrics">
<div class="metric"><div class="metric-label">Balance</div><div class="metric-value mono" id="balance">$0</div></div>
<div class="metric"><div class="metric-label">Realized P&L</div><div class="metric-value mono" id="realized">$0</div><div class="metric-sub" id="realized-sub">—</div></div>
<div class="metric"><div class="metric-label">Unrealized P&L</div><div class="metric-value mono" id="unrealized">$0</div></div>
<div class="metric"><div class="metric-label">Win Rate</div><div class="metric-value" id="winrate">0%</div><div class="metric-sub" id="wr-sub">—</div></div>
</div>
<div class="panel"><div class="panel-hdr"><h2>Open Positions</h2><span class="pill" id="pos-pill">0</span></div><table><thead><tr><th>Market</th><th>Side</th><th>Qty</th><th>Entry</th><th>Current</th><th class="right">P&L</th></tr></thead><tbody id="pos-body"><tr><td colspan="6" class="loading">Loading...</td></tr></tbody></table></div>
<div class="panel"><div class="panel-hdr"><h2>Closed Trades</h2><span class="pill" id="trades-pill">0</span></div><table><thead><tr><th>Time</th><th>Market</th><th>Side</th><th>Qty</th><th>Cost</th><th>Return</th><th class="right">P&L</th></tr></thead><tbody id="trades-body"><tr><td colspan="7" class="loading">No trades yet</td></tr></tbody></table></div>
<script>
function fmt(n){return parseFloat(n||0).toFixed(2)}
function setPNL(id,v){const el=document.getElementById(id);el.textContent='$'+(v>=0?'+':'')+fmt(v);el.className='metric-value mono '+(v>=0?'pos':'neg')}
async function update(){try{const r=await fetch('/api/portfolio');const d=await r.json();if(d.error)return;const s=d.stats||{};document.getElementById('balance').textContent='$'+fmt(d.balance);setPNL('realized',s.realized_pnl||0);setPNL('unrealized',s.unrealized_pnl||0);document.getElementById('winrate').textContent=(s.win_rate||0)+'%';document.getElementById('wr-sub').textContent=(s.wins||0)+'W / '+(s.losses||0)+'L';document.getElementById('realized-sub').textContent=(s.wins+s.losses||0)+' settled';const positions=d.positions||[];document.getElementById('pos-pill').textContent=positions.length;const pb=document.getElementById('pos-body');pb.innerHTML=positions.length===0?'<tr><td colspan="6" class="loading">No open positions</td></tr>':positions.map(p=>`<tr><td><div class="ticker">${p.ticker}</div><div style="font-size:0.7rem;color:#64748b">${(p.title||'').substring(0,50)}</div></td><td><strong>${p.side}</strong></td><td>${p.count}</td><td class="mono">$${fmt(p.entry_avg)}</td><td class="mono">$${fmt(p.current_price)}</td><td class="right mono ${p.unrealized_pnl>=0?'pos':'neg'}">$${(p.unrealized_pnl>=0?'+':'')+fmt(p.unrealized_pnl)}</td></tr>`).join('');const trades=d.closed_trades||[];document.getElementById('trades-pill').textContent=trades.length;const tb=document.getElementById('trades-body');tb.innerHTML=trades.length===0?'<tr><td colspan="7" class="loading">No trades yet</td></tr>':trades.map(t=>`<tr><td style="font-size:0.8rem">${t.time}</td><td class="ticker">${t.ticker}</td><td>${t.side}</td><td>${t.count}</td><td class="mono">$${fmt(t.cost)}</td><td class="mono">$${fmt(t.revenue)}</td><td class="right mono ${t.pnl>=0?'pos':'neg'}">$${(t.pnl>=0?'+':'')+fmt(t.pnl)}</td></tr>`).join('')}catch(err){console.error(err)}}
setInterval(update,15000);update();
</script></body></html>
