services:
  # The trading bot (background worker) — writes signals to the shared disk
  - type: worker
    name: kalshi-trading-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 main.py --category all --max-bet 5 --max-positions 15 --max-daily-loss 25
    envVars:
      - key: KALSHI_EMAIL
        sync: false
      - key: KALSHI_PASSWORD
        sync: false
      - key: KALSHI_RSA_KEY
        sync: false
      - key: SIGNAL_LOG_PATH
        value: /data/signal_log.json
    disk:
      name: kalshi-data
      mountPath: /data
      sizeGB: 1

  # The dashboard (web service) — reads signals from the SAME shared disk
  - type: web
    name: kalshi-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 dashboard.py
    envVars:
      - key: KALSHI_EMAIL
        sync: false
      - key: KALSHI_PASSWORD
        sync: false
      - key: KALSHI_RSA_KEY
        sync: false
      - key: SIGNAL_LOG_PATH
        value: /data/signal_log.json
    disk:
      name: kalshi-data
      mountPath: /data
      sizeGB: 1
